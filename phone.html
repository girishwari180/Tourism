<!DOCTYPE html>
<html>
<head>
<title>Contact - Tourism</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
    background-size: cover;
    background-position: center;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}


.container{
    background:white;
    padding:50px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
    width:400px;
}

h1{
    font-size:40px;
    color:#2c3e50;
    margin-bottom:20px;
}

.call{
    font-size:28px;
    color:#27ae60;
    margin:20px 0;
}

.text{
    font-size:18px;
    color:#555;
    margin-bottom:30px;
}

a{
    text-decoration:none;
    background:#3498db;
    color:white;
    padding:12px 25px;
    border-radius:8px;
    font-size:16px;
    transition:0.3s;
}

a:hover{
    background:#217dbb;
}

</style>
</head>

<body>

<div class="container">
    <h1>Contact Us</h1>

    <p class="call">
        📞 Call: <b>+91 9876543210</b>
    </p>

    <p class="text">Available anytime to help plan your journey ✈️</p>

    <a href="enquiry.html">Go Back</a>
</div>

</body>
</html>
